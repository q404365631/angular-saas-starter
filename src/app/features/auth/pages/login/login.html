<p-card styleClass="login-card">
  <ng-template pTemplate="header">
    <div class="card-header">
      <h1>{{ 'signIn' | translate }}</h1>
      <p>{{ 'signInSubtitle' | translate }}</p>
    </div>
  </ng-template>

  <form class="form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <label>
      <span>{{ 'email' | translate }}</span>
      <input pInputText type="email" formControlName="email" autocomplete="email" />
      <app-field-error [control]="form.get('email')" />
    </label>

    <label>
      <span>{{ 'password' | translate }}</span>
      <p-password
        formControlName="password"
        [toggleMask]="true"
        [feedback]="false"
        [fluid]="true"
        autocomplete="current-password"
      />
      <app-field-error [control]="form.get('password')" />
    </label>

    @if (error(); as err) {
      <div class="form-error">{{ err }}</div>
    }

    <p-button type="submit" [label]="'signIn' | translate" [fluid]="true" [loading]="submitting()" />

    <p class="alt">
      {{ 'noAccount' | translate }} <a routerLink="/register">{{ 'createOne' | translate }}</a>
    </p>
  </form>
</p-card>
