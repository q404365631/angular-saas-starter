<div class="access-denied">
  <i class="pi pi-lock icon"></i>
  <h1>{{ 'accessDeniedTitle' | translate }}</h1>
  <p>
    {{ 'accessDeniedDesc' | translate }}
    @if (permission) {
      <br />
      <small>{{ 'requiredPermission' | translate }}: <code>{{ permission }}</code></small>
    }
  </p>
  <p-button [label]="'goToDashboard' | translate" icon="pi pi-home" routerLink="/dashboard" />
</div>
